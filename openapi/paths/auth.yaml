register:
  post:
    operationId: registerUser
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/AuthRegisterRequest'
    responses:
      '201':
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

login:
  post:
    operationId: loginUser
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/AuthLoginRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '401':
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

refresh:
  post:
    operationId: refreshToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/AuthRefreshRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '401':
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'