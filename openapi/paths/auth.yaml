register:
  post:
    operationId: registerUser
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/AuthRegisterRequest'
    responses:
      '201':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '400':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiError'

login:
  post:
    operationId: loginUser
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/AuthLoginRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiError'

refresh:
  post:
    operationId: refreshToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/AuthRefreshRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiError'