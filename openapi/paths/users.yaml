profile:
  get:
    operationId: getMyProfile
    summary: Профиль текущего пользователя со статистикой
    responses:
      '200':
        description: Профиль пользователя
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UserFull'
      '401':
        description: Не авторизован
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiError'