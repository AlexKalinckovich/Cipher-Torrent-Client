collection:
  get:
    operationId: getTorrentPeers
    summary: Список пиров для указанного торрента
    parameters:
      - name: infoHash
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Массив пиров
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../openapi.yaml#/components/schemas/Peer'
      '404':
        description: Торрент не найден
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiError'